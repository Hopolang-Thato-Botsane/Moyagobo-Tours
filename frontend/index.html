<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moyagobo-Tours</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/section-about-services.css">
    <link rel="stylesheet" href="css/section-testimonial.css">
    <link rel="stylesheet" href="css/section-footer.css">
</head>
<body>

    <section class="about-services-section">
        <div class="about-services-wrapper">
            <div class="brand-side">
                <img src="" alt="M-Tours Logo">
            </div>
            <div class="content-side">
                <h2 class="about-services-heading"></h2>
                <p class="about-services-body"></p>
                <ul class="services-list"></ul>
            </div>
        </div>
    </section>

    <section class="testimonial-section">

        <div class="testimonial-wrapper">
            <button class="nav-toggle prev-btn">←</button>
            
            <div class="content-box">
                <div class="stars" id="star-rating"></div>
                <p class="quote">"</p>
                <h3 class="author-name"></h3>
                <p class="author-role"></p>
            </div>

            <button class="nav-toggle next-btn">→</button>
        </div>
        
        <div class="pagination-dots">
        </div>

    </section>

    <footer class="footer-integrated-section" id="footer-section">
        <div class="cta-overlay">
            <h2 id="cta-heading"></h2>
            <p id="cta-subheading"></p>
            <button id="cta-btn">Request Quote</button>
        </div>

        <div class="footer-wrapper">
            <div class="footer-top">
                <div class="left-brand">
                    <h3>M-Tours</h3>
                    <p id="brand-desc"></p>
                    <div class="social-icons" id="social-container"></div>
                </div>
                
                <div class="right-links">
                    <div class="footer-links">
                        <h4>Get In Touch</h4>
                        <p id="footer-phone"></p>
                        <p id="footer-email"></p>
                    </div>
                    <div class="footer-links">
                        <h4>Legal</h4>
                        <ul id="legal-list"></ul>
                    </div>
                    <div class="footer-links">
                        <h4>Navigation</h4>
                        <ul id="nav-list"></ul>
                    </div>
                </div>
            </div>

            <div class="footer-bottom">
                <p>&copy; 2026 MTours. All rights reserved.</p>
                <p>Built by: <em>thbjr</em></p>
            </div>
        </div>
    </footer>

    <script src="js/appCMS.js"></script>
</body>
</html>
